<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Wedding Planner & Coordinator</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#FAF6F0',
              100: '#F3EAE0',
              200: '#E6D2BF',
              300: '#D4B69A',
              400: '#C29B77',
              500: '#B28259',
              600: '#9F6E49',
              700: '#865A3B',
              800: '#6D482F',
              900: '#573A27',
            },
            gray: {
              50: '#FAF6F0',
              100: '#F3EAE0',
              200: '#E6D2BF',
              300: '#D4B69A',
              400: '#A39E93',
              500: '#858074',
              600: '#696459',
              700: '#4F4B41',
              800: '#2E2D2A',
              900: '#1A1A18',
              950: '#121210',
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
</head>
<body class="min-h-screen bg-primary-50 dark:bg-gray-950 flex flex-col justify-between py-12 px-4 sm:px-6 lg:px-8 relative transition-custom">

  <!-- Floating Settings Toggles -->
  <div class="absolute top-6 right-6 flex items-center space-x-3">
    <button class="rtl-toggle p-2 rounded-full bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 transition-custom" title="Toggle RTL/LTR">
      <span class="text-sm font-semibold tracking-wider">RTL</span>
    </button>
    <button class="theme-toggle p-2 rounded-full bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 transition-custom" title="Toggle Light/Dark Mode">
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
      </svg>
    </button>
  </div>

  <div class="my-auto sm:mx-auto sm:w-full sm:max-w-md">
    <!-- Header/Logo -->
    <div class="text-center mb-8">
      <h2 class="font-serif text-4xl font-semibold tracking-wide text-primary-600 dark:text-primary-400">Ever After</h2>
      <p class="mt-2 text-sm text-gray-600 dark:text-gray-400">Wedding Planners & Coordinators</p>
    </div>

    <!-- Login Card -->
    <div class="bg-white dark:bg-gray-900 py-8 px-6 shadow-xl rounded-3xl border border-gray-100 dark:border-gray-800 sm:px-10">
      <h3 class="font-serif text-2xl font-semibold text-gray-900 dark:text-white mb-6 text-center">Welcome Back</h3>
      
      <form id="login-form" class="space-y-6">
        <!-- Email Input -->
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Email Address</label>
          <div class="mt-1">
            <input id="email" name="email" type="email" required placeholder="name@example.com" class="appearance-none block w-full px-4 py-3 border border-gray-200 dark:border-gray-800 rounded-xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-primary-500 focus:border-primary-500 sm:text-sm">
          </div>
          <p class="mt-1 text-xs text-gray-400">Use <span class="font-mono">admin@example.com</span> to access the Admin Panel, or any other email for Couple Portal.</p>
        </div>

        <!-- Password Input -->
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Password</label>
          <div class="mt-1 relative rounded-md shadow-sm">
            <input id="password" name="password" type="password" required placeholder="••••••••" class="appearance-none block w-full px-4 py-3 border border-gray-200 dark:border-gray-800 rounded-xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-primary-500 focus:border-primary-500 sm:text-sm">
            <button type="button" class="toggle-password absolute inset-y-0 right-0 pr-3 flex items-center" data-target="password">
              <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Remember Me + Forgot Password -->
        <div class="flex items-center justify-between">
          <div class="flex items-center">
            <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-primary-600 focus:ring-primary-500 border-gray-300 rounded">
            <label for="remember-me" class="ml-2 block text-sm text-gray-700 dark:text-gray-300">Remember me</label>
          </div>
          <div class="text-sm">
            <a href="#" class="font-medium text-primary-600 dark:text-primary-400 hover:text-primary-500">Forgot password?</a>
          </div>
        </div>

        <!-- Submit Button -->
        <div>
          <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-semibold text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition-custom">
            Sign In
          </button>
        </div>
      </form>

      <!-- Social Logins -->
      <div class="mt-6">
        <div class="relative">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-200 dark:border-gray-800"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-2 bg-white dark:bg-gray-900 text-gray-500">Or continue with</span>
          </div>
        </div>

        <div class="mt-6 grid grid-cols-2 gap-3">
          <a href="#" class="w-full inline-flex justify-center py-2.5 px-4 border border-gray-200 dark:border-gray-800 rounded-xl bg-white dark:bg-gray-900 text-sm font-medium text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800">
            <span class="sr-only">Sign in with Google</span>
            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12.24 10.285V14.4h6.887c-.648 2.41-2.519 4.114-5.136 4.114-3.51 0-6.353-2.853-6.353-6.353s2.843-6.353 6.353-6.353c1.614 0 3.15.58 4.35 1.625l3.078-3.078C19.395 2.5 16.03 1.25 12.24 1.25 6.262 1.25 1.39 6.12 1.39 12.1s4.872 10.85 10.85 10.85c5.782 0 10.58-4.125 10.58-10.85 0-.607-.052-1.215-.157-1.815H12.24z"/>
            </svg>
          </a>
          <a href="#" class="w-full inline-flex justify-center py-2.5 px-4 border border-gray-200 dark:border-gray-800 rounded-xl bg-white dark:bg-gray-900 text-sm font-medium text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800">
            <span class="sr-only">Sign in with Apple</span>
            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor">
              <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-1 .04-2.2.67-2.92 1.49-.62.71-1.16 1.85-1.01 2.96 1.12.09 2.27-.57 2.94-1.39z"/>
            </svg>
          </a>
        </div>
      </div>

      <div class="mt-6 text-center">
        <p class="text-sm text-gray-600 dark:text-gray-400">Don't have an account? <a href="signup.html" class="font-medium text-primary-600 dark:text-primary-400 hover:text-primary-500">Sign up</a></p>
      </div>
    </div>
  </div>

  <script src="../assets/js/main.js"></script>
</body>
</html>
